services:
  redis:
    image: redis:8.6-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
    environment:
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    volumes:
      - ./data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      # Bind apenas em loopback: acesso remoto só via túnel SSH (ver README).
      - "127.0.0.1:6379:6379"
    networks:
      - infra
    logging:
      # Log vai para stderr (docker logs redis); rotação por tamanho,
      # sem depender de logrotate/permissões no host.
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          # Ajuste conforme a RAM do servidor.
          # Regra: REDIS_MAXMEMORY + margem para fork do BGSAVE/AOF rewrite
          # (copy-on-write pode duplicar parte das páginas em uso durante o rewrite)
          memory: 1G
          cpus: "1"

networks:
  infra:
    external: true
