# =============================================================================
# Network
# =============================================================================
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# =============================================================================
# General
# =============================================================================
daemonize no
loglevel notice
logfile ""
databases 16

# =============================================================================
# Persistence — RDB (snapshot de emergência)
# =============================================================================
save 3600 1
save 300 100
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# =============================================================================
# Persistence — AOF (durabilidade para sessions e queues)
# =============================================================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# =============================================================================
# Memory
# maxmemory e requirepass são injetados via comando Docker (não ficam neste arquivo)
# =============================================================================
maxmemory-policy noeviction

# =============================================================================
# Segurança — comandos desabilitados
# FLUSHALL: apagaria TODOS os bancos (cache + sessions + queues) de uma vez
# FLUSHDB: mantido habilitado — age apenas no banco selecionado pela conexão;
#          configure o Laravel com bancos separados (DB 1 para cache) para que
#          `php artisan cache:clear` nunca toque sessions (DB 0) ou queues (DB 2)
# DEBUG: expõe internals do processo
# KEYS: O(N) sem limite; use SCAN em produção
# SHUTDOWN: o container é encerrado pelo Docker
# =============================================================================
rename-command FLUSHALL ""
rename-command DEBUG    ""
rename-command KEYS     ""
rename-command SHUTDOWN ""

# =============================================================================
# Observabilidade
# =============================================================================
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 100

# =============================================================================
# Performance
# =============================================================================
activerehashing yes
hz 10
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes
